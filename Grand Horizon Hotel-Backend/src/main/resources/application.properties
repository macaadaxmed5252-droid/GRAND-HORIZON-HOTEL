# Used only when zero ROLE_ADMIN accounts exist at startup. Override these
# via environment variables in real deployments instead of editing this
# file - e.g. APPLICATION_SECURITY_DEFAULT-ADMIN_PASSWORD=... .
# ===================================================================
application.security.default-admin.name=Grand Horizon Administrator
application.security.default-admin.email=admin@grandhorizon.com
application.security.default-admin.password=Admin@12345
