# ===================================================================
# APPLICATION & SERVER CONFIGURATION
# ===================================================================
spring.application.name=Grand Horizon Hotel
server.port=5252

# ===================================================================
# LOCAL DATABASE CONFIGURATION (TARGET: LOCALHOST)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/grand_horizon_db
spring.datasource.username=postgres
spring.datasource.password=GrandHorizon2026
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------
# HikariCP resilience: with initialization-fail-timeout=-1, the connection
# pool does NOT block application startup on an initial connection check.
# The ApplicationContext (and embedded Tomcat) will come up successfully
# even if Postgres is unreachable at boot time, and Hikari keeps retrying
# in the background. Requests that need the database during an outage will
# fail individually and are caught by GlobalExceptionHandler's
# DataAccessException handler (503) instead of taking the whole app down.
# ---------------------------------------------------------------------
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1800000

# ===================================================================
# JPA & HIBERNATE SETTINGS
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# SECURITY CONFIGURATION (JWT SETTINGS)
# ===================================================================
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# ===================================================================
# INVOICE STORAGE
# ===================================================================
application.invoice.storage-path=invoices

# ===================================================================
# FILE UPLOAD CONFIGURATION (ROOM IMAGES)
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
application.upload.root-dir=uploads
application.upload.rooms-subdir=rooms
application.upload.avatars-subdir=avatars

# ===================================================================
